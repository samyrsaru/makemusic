server {
    listen 80;
    server_name music-api.likeahe.ro;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name music-api.likeahe.ro;

    ssl_certificate /etc/ssl/certs/likeahe.ro.pem;
    ssl_certificate_key /etc/ssl/private/likeahe.ro.pem;

    # Proxy /api/* requests to backend without /api prefix
    location /api/ {
        proxy_pass http://localhost:3003/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Critical for Clerk auth
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy all other requests to backend
    location / {
        proxy_pass http://localhost:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Critical for Clerk auth
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}
